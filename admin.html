<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPUP ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: "Pretendard Variable", Pretendard, sans-serif; background: #f3f4f6; height: 100vh; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .inp { width:100%; border:1px solid #d1d5db; border-radius:8px; padding:7px 11px; font-size:13px; outline:none; transition:border-color 0.15s; background:#fff; font-family:inherit; }
        .inp:focus { border-color:#111827; box-shadow:0 0 0 3px rgba(17,24,39,0.1); }
        .lbl { font-size:10px; font-weight:700; color:#9ca3af; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:3px; display:block; }

        .btn { display:inline-flex; align-items:center; justify-content:center; gap:5px; font-weight:700; border-radius:8px; transition:all 0.15s; cursor:pointer; border:none; font-family:inherit; font-size:13px; }
        .btn:active { transform:scale(0.97); }
        .btn-dark { background:#111827; color:#fff; }
        .btn-dark:hover:not(:disabled) { background:#000; }
        .btn-dark:disabled { background:#9ca3af; cursor:not-allowed; transform:none; }
        .btn-gray { background:#f3f4f6; color:#374151; border:1px solid #e5e7eb; }
        .btn-gray:hover { background:#e5e7eb; }
        .btn-red  { background:#fff1f2; color:#dc2626; border:1px solid #fecaca; }
        .btn-red:hover { background:#ffe4e6; }

        .tab-pill { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; color:#9ca3af; border:none; background:transparent; font-family:inherit; }
        .tab-pill.on { background:#374151; color:#fff; }

        .p-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:#fff; border:1px solid #e5e7eb; border-radius:10px; transition:border-color 0.15s; }
        .p-row:hover { border-color:#9ca3af; }
        .p-row.drag-over { border-color:#111827; background:#f9fafb; }

        .chip { display:inline-flex; align-items:center; gap:4px; background:#f3f4f6; border:1px solid #e5e7eb; border-radius:20px; padding:3px 9px; font-size:11px; font-weight:600; }
        .chip-x { color:#9ca3af; cursor:pointer; font-size:13px; line-height:1; }
        .chip-x:hover { color:#ef4444; }

        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); backdrop-filter:blur(4px); z-index:50; display:flex; align-items:center; justify-content:center; padding:24px; }
        .modal  { background:#fff; border-radius:14px; width:100%; max-width:500px; max-height:88vh; overflow-y:auto; box-shadow:0 24px 80px rgba(0,0,0,0.22); }

        .spin { border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; width:14px; height:14px; animation:rot 0.8s linear infinite; display:inline-block; }
        @keyframes rot { to{transform:rotate(360deg);} }

        .login-wrap { height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { background:#fff; border-radius:16px; padding:44px 36px; width:100%; max-width:380px; box-shadow:0 4px 24px rgba(0,0,0,0.09); border:1px solid #e5e7eb; }

        .toast-el { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#111827; color:#fff; padding:11px 18px; border-radius:100px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; box-shadow:0 8px 32px rgba(0,0,0,0.18); z-index:200; white-space:nowrap; }

        /* 미리보기 */
        .pv-card { background:#fff; border:2px solid rgba(0,0,0,0.06); border-radius:12px; padding:10px; margin-bottom:10px; position:relative; overflow:hidden; }
        .pv-card.all-out { border-color:#e5e7eb; }
        .pv-soldout { position:absolute; inset:0; background:rgba(255,255,255,0.6); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; z-index:5; border-radius:10px; }
        .pv-opt { font-size:10px; padding:3px 7px; border-radius:5px; font-weight:700; border:1px solid transparent; display:flex; align-items:baseline; gap:3px; }
        .pv-in  { background:#DCFCE7; color:#166534; border-color:#86EFAC; }
        .pv-out { background:#FEE2E2; color:#991B1B; border-color:#FECACA; text-decoration:line-through; }

        .animate-marquee { display:inline-block; padding-left:100%; animation:mq 18s linear infinite; }
        @keyframes mq { 0%{transform:translate(0,0);} 100%{transform:translate(-100%,0);} }
    </style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div id="login-screen" class="login-wrap">
    <div class="login-card">
        <div class="text-center mb-7">
            <div class="inline-flex items-center justify-center w-11 h-11 bg-gray-900 rounded-xl mb-3">
                <i data-lucide="shield" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-xl font-bold">Popup Admin</h1>
            <p class="text-xs text-gray-400 mt-1">상품 구성 및 설정 관리</p>
        </div>
        <label class="lbl">관리자 비밀번호</label>
        <input type="password" id="admin-pw" class="inp mb-3" placeholder="비밀번호 입력">
        <p id="login-error" class="hidden text-xs text-red-500 mb-2 text-center">비밀번호가 올바르지 않습니다.</p>
        <button id="login-btn" class="btn btn-dark w-full py-3">
            <i data-lucide="log-in" class="w-4 h-4"></i> 입장
        </button>
        <p id="conn-note" class="text-center text-xs text-gray-400 mt-3">Firebase 연결 중...</p>
    </div>
</div>

<!-- ════════ MAIN ════════ -->
<div id="main-screen" class="hidden h-screen flex flex-col">

    <!-- 헤더 -->
    <header class="bg-gray-900 text-white px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <span class="font-bold text-sm">POPUP ADMIN</span>
            <span id="hdr-location" class="text-xs text-gray-400"></span>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex gap-1 bg-gray-800 rounded-xl p-1">
                <button class="tab-pill on" id="tab-btn-products">상품 관리</button>
                <button class="tab-pill"    id="tab-btn-settings">설정</button>
            </div>
            <button id="logout-btn" class="btn btn-gray py-1.5 px-3 text-xs">
                <i data-lucide="log-out" class="w-3.5 h-3.5"></i> 로그아웃
            </button>
        </div>
    </header>

    <!-- 바디 -->
    <div class="flex flex-1 overflow-hidden">

        <!-- 좌측 편집 -->
        <div class="flex-1 overflow-y-auto scrollbar-hide px-6 py-5">

            <!-- 상품 관리 -->
            <div id="tab-products">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-base font-bold text-gray-900">상품 관리</h2>
                        <p class="text-xs text-gray-400 mt-0.5" id="product-count">로딩 중...</p>
                    </div>
                    <button id="add-product-btn" class="btn btn-dark px-3 py-2 text-xs">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> 상품 추가
                    </button>
                </div>
                <div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-2.5 mb-4 flex items-center gap-2">
                    <i data-lucide="info" class="w-3.5 h-3.5 text-amber-600 shrink-0"></i>
                    <p class="text-xs text-amber-800 font-medium">저장하면 우측 미리보기 및 고객 화면이 즉시 업데이트되고 재고는 전체 초기화됩니다.</p>
                </div>
                <div id="product-list" class="space-y-2 mb-5"></div>
                <button id="save-products-btn" class="btn btn-dark w-full py-3">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    <span>상품 구성 저장 (즉시 반영)</span>
                </button>
            </div>

            <!-- 설정 -->
            <div id="tab-settings" class="hidden">
                <h2 class="text-base font-bold text-gray-900 mb-4">설정</h2>
                <div class="bg-white border border-gray-200 rounded-xl p-5 space-y-4 mb-4">
                    <div>
                        <label class="lbl">팝업 장소명</label>
                        <input type="text" id="set-location" class="inp" placeholder="신세계 센텀시티 부산">
                    </div>
                    <div>
                        <label class="lbl">온라인 스토어 URL</label>
                        <input type="url" id="set-url" class="inp" placeholder="https://...">
                    </div>
                    <div class="border-t border-gray-100 pt-4">
                        <p class="text-xs font-bold text-gray-700 mb-2">비밀번호 변경</p>
                        <label class="lbl">공통 비밀번호 (어드민 + 재고 관리 공용)</label>
                        <input type="password" id="set-pw" class="inp" placeholder="변경 시에만 입력 (비워두면 유지)">
                    </div>
                </div>
                <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-2.5 mb-4 flex items-start gap-2">
                    <i data-lucide="alert-triangle" class="w-3.5 h-3.5 text-red-500 mt-0.5 shrink-0"></i>
                    <p class="text-xs text-red-700 font-medium">비밀번호 변경 시 반드시 메모해두세요.</p>
                </div>
                <button id="save-settings-btn" class="btn btn-dark w-full py-3">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    <span>설정 저장 (즉시 반영)</span>
                </button>
            </div>
        </div>

        <!-- 우측 미리보기 -->
        <div class="w-[340px] min-w-[340px] h-full bg-[#f8f9fa] border-l border-gray-200 flex flex-col overflow-hidden">
            <div class="bg-white border-b border-gray-200 px-4 py-3 shrink-0">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold text-gray-900">POP-UP LIVE STOCK</span>
                    <span class="text-[10px] text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full font-medium">미리보기</span>
                </div>
                <p id="preview-subtitle" class="text-[10px] text-gray-500 mt-0.5"></p>
            </div>
            <div class="bg-gray-600 text-white px-3 py-1.5 text-[10px] font-bold flex items-center gap-2 shrink-0 overflow-hidden whitespace-nowrap">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse shrink-0"></span>
                <div class="animate-marquee">실시간 재고 현황 · 붉은색 표시는 품절 · 현장 상황에 따라 차이가 있을 수 있습니다.</div>
            </div>
            <div id="preview-list" class="flex-1 overflow-y-auto scrollbar-hide p-3"></div>
        </div>
    </div>
</div>

<!-- 상품 편집 모달 -->
<div id="product-modal" class="hidden overlay">
    <div class="modal p-6">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-base font-bold" id="modal-title">상품 추가</h3>
            <button id="modal-close-btn" class="text-gray-400 hover:text-gray-700 p-1 rounded-lg hover:bg-gray-100">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
                <div><label class="lbl">한글 상품명</label><input type="text" id="pm-name" class="inp" placeholder="MMMM_베이비 코스튬 인형"></div>
                <div><label class="lbl">영문 상품명</label><input type="text" id="pm-engname" class="inp" placeholder="MMMM_BABY COSTUME PLUSH"></div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div><label class="lbl">가격 (원)</label><input type="number" id="pm-price" class="inp" placeholder="23000"></div>
                <div><label class="lbl">카테고리</label><input type="text" id="pm-category" class="inp" placeholder="PLUSH"></div>
                <div>
                    <label class="lbl">이미지 미리보기</label>
                    <div id="img-preview" class="w-full h-[34px] rounded-lg bg-gray-100 border border-gray-200 overflow-hidden flex items-center justify-center text-gray-300">
                        <i data-lucide="image" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
            <div><label class="lbl">이미지 URL (Shopify CDN)</label><input type="url" id="pm-image" class="inp" placeholder="https://cdn.shopify.com/..."></div>
            <div>
                <label class="lbl">옵션 목록</label>
                <div id="option-tags" class="flex flex-wrap gap-1.5 min-h-[36px] p-2 border border-dashed border-gray-200 rounded-lg mb-2 bg-gray-50">
                    <span class="text-xs text-gray-400 self-center">옵션을 추가하세요</span>
                </div>
                <div class="flex gap-2 mb-2">
                    <input type="text" id="opt-name" class="inp" placeholder="옵션명 (예: 먀미)">
                    <input type="text" id="opt-en"   class="inp" placeholder="영문명 (선택)">
                    <button id="add-option-btn" class="btn btn-dark px-4 shrink-0">추가</button>
                </div>
                <div class="flex flex-wrap gap-1.5" id="preset-btns">
                    <button data-preset="mmmm"   class="text-[11px] bg-gray-100 hover:bg-gray-200 border border-gray-200 rounded-lg px-2.5 py-1 font-semibold">MMMM 5종</button>
                    <button data-preset="single" class="text-[11px] bg-gray-100 hover:bg-gray-200 border border-gray-200 rounded-lg px-2.5 py-1 font-semibold">단품</button>
                    <button data-preset="free"   class="text-[11px] bg-gray-100 hover:bg-gray-200 border border-gray-200 rounded-lg px-2.5 py-1 font-semibold">FREE</button>
                    <button data-preset="size"   class="text-[11px] bg-gray-100 hover:bg-gray-200 border border-gray-200 rounded-lg px-2.5 py-1 font-semibold">사이즈 S-XL</button>
                </div>
            </div>
        </div>
        <div class="flex gap-3 mt-5">
            <button id="modal-cancel-btn" class="btn btn-gray flex-1 py-2.5">취소</button>
            <button id="modal-save-btn"   class="btn btn-dark flex-1 py-2.5">저장</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast-el hidden">
    <div class="bg-green-500 rounded-full p-0.5"><i data-lucide="check" class="w-3 h-3 text-white"></i></div>
    <span id="toast-msg"></span>
</div>

    {id:"g13", name:"MMMM_턴어라운드 머그",            engName:"MMMM_TURNAROUND MUG",            price:18000, category:"LIVING",  image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Mug_01.jpg?v=1770178433",             options:[{name:"단품",en:""}]},
    {id:"g14", name:"MMMM_레이어드 아크릴 마그넷",    engName:"MMMM_LAYERED ACR MAGNET",        price:8000,  category:"LIVING",  image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_6296e3a7-bc3d-4ff2-9afd-ff26698c7cf2.jpg?v=1770179130", options:MMMM_OPTS},
    {id:"g15", name:"MMMM_응원봉 메탈참 스트랩",      engName:"MMMM_METAL CHARM STRAP",         price:16000, category:"ACC",     image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_0858f66b-aed6-462c-a268-fce58fa05d70.jpg?v=1770178517", options:MMMM_OPTS},
    {id:"g16", name:"MMMM_후드 집업",                 engName:"MMMM_HOODIE ZIPUP",              price:75000, category:"FASHION", image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_8883ed28-f008-4245-bd8b-b3b47e8cd449.jpg?v=1770178397", options:[{name:"FREE",en:""}]}
];
var DEFAULT_SETTINGS = { location:"신세계 센텀시티 부산 (Shinsegae Centum City Busan)", storeUrl:"https://linefriendssquare.com/collections/mmmm?utm_source=OFFLINE_STOCK_BUSAN", adminPassword:"0715" };
var PRESETS = {
    mmmm:   [{name:"먀미",en:"meowmi"},{name:"므모",en:"muhmo"},{name:"미므",en:"miimu"},{name:"뫄",en:"moi"},{name:"몌무",en:"meymu"}],
    single: [{name:"단품",en:""}], free: [{name:"FREE",en:""}],
    size:   [{name:"S",en:""},{name:"M",en:""},{name:"L",en:""},{name:"XL",en:""}]
};

var editingProducts = [];
var savedSettings   = Object.assign({}, DEFAULT_SETTINGS);
var previewStock    = {};
var modalIdx  = null;
var modalOpts = [];
var dragSrc   = null;
var stockUnsub = null;

function $id(id){ return document.getElementById(id); }

document.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
    bindEvents();
    auth.signInAnonymously()
        .then(function(){ return db.doc(SETTINGS_PATH).get(); })
        .then(function(snap){
            if(snap.exists) savedSettings = Object.assign({}, DEFAULT_SETTINGS, snap.data());
            $id('conn-note').innerText = '서버 연결 완료 ✓';
            $id('conn-note').className = 'text-center text-xs text-green-500 mt-3';
        })
        .catch(function(e){
            console.error(e);
            $id('conn-note').innerText = '연결 실패';
            $id('conn-note').className = 'text-center text-xs text-red-400 mt-3';
        });
});

function bindEvents() {
    $id('admin-pw').addEventListener('keypress', function(e){ if(e.key==='Enter') doLogin(); });
    $id('login-btn').addEventListener('click', doLogin);
    $id('logout-btn').addEventListener('click', doLogout);
    $id('tab-btn-products').addEventListener('click', function(){ switchTab('products'); });
    $id('tab-btn-settings').addEventListener('click',  function(){ switchTab('settings'); });
    $id('add-product-btn').addEventListener('click', openAdd);
    $id('save-products-btn').addEventListener('click', saveProducts);
    $id('save-settings-btn').addEventListener('click', saveSettings);
    $id('modal-close-btn').addEventListener('click', closeModal);
    $id('modal-cancel-btn').addEventListener('click', closeModal);
    $id('modal-save-btn').addEventListener('click', confirmModal);
    $id('product-modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
    $id('add-option-btn').addEventListener('click', addOption);
    $id('opt-name').addEventListener('keypress', function(e){ if(e.key==='Enter'){e.preventDefault();addOption();} });
    $id('opt-en').addEventListener('keypress',   function(e){ if(e.key==='Enter'){e.preventDefault();addOption();} });
    $id('pm-image').addEventListener('input', function(e){ setImgPreview(e.target.value); });
    $id('preset-btns').addEventListener('click', function(e){
        var btn = e.target.closest('[data-preset]');
        if(!btn) return;
        modalOpts = PRESETS[btn.dataset.preset].map(function(o){return Object.assign({},o);});
        renderOptionTags();
    });
    $id('option-tags').addEventListener('click', function(e){
        var rm = e.target.closest('[data-rmopt]');
        if(!rm) return;
        modalOpts.splice(parseInt(rm.dataset.rmopt),1);
        renderOptionTags();
    });
}

function doLogin() {
    var pw = $id('admin-pw').value;
    if(pw !== (savedSettings.adminPassword||DEFAULT_SETTINGS.adminPassword)){
        $id('login-error').classList.remove('hidden');
        $id('admin-pw').value=''; $id('admin-pw').focus(); return;
    }
    $id('login-error').classList.add('hidden');
    loadAll().then(function(){
        $id('login-screen').classList.add('hidden');
        $id('main-screen').classList.remove('hidden');
        lucide.createIcons();
        startStockListen();
    });
}

function doLogout() {
    if(stockUnsub){stockUnsub();stockUnsub=null;}
    $id('main-screen').classList.add('hidden');
    $id('login-screen').classList.remove('hidden');
    $id('admin-pw').value='';
}

function loadAll() {
    return db.doc(PRODUCTS_PATH).get()
        .then(function(snap){
            var raw = (snap.exists&&snap.data().list&&snap.data().list.length) ? snap.data().list : DEFAULT_PRODUCTS;
            editingProducts = raw.map(function(p){
                return Object.assign({},p,{options:p.options.map(function(o){
                    return typeof o==='object'?{name:o.name||'',en:o.en||''}:{name:o,en:''};
                })});
            });
        })
        .catch(function(){
            editingProducts = DEFAULT_PRODUCTS.map(function(p){return Object.assign({},p,{options:p.options.map(function(o){return Object.assign({},o);})});});
        })
        .then(function(){
            $id('hdr-location').innerText       = savedSettings.location||'';
            $id('preview-subtitle').innerText   = savedSettings.location||'';
            $id('set-location').value = savedSettings.location||'';
            $id('set-url').value      = savedSettings.storeUrl||'';
            renderProductList();
            renderPreview();
        });
}

function startStockListen() {
    if(stockUnsub) stockUnsub();
    stockUnsub = db.doc(STOCK_PATH).onSnapshot(function(snap){
        previewStock = snap.exists ? snap.data() : {};
        renderPreview();
    });
}

function switchTab(tab) {
    $id('tab-products').classList.toggle('hidden', tab!=='products');
    $id('tab-settings').classList.toggle('hidden', tab!=='settings');
    $id('tab-btn-products').classList.toggle('on', tab==='products');
    $id('tab-btn-settings').classList.toggle('on', tab==='settings');
}

function renderProductList() {
    $id('product-list').innerHTML = editingProducts.map(function(p,idx){
        return '<div class="p-row" draggable="true" data-idx="'+idx+'">' +
            '<div class="text-gray-300 hover:text-gray-500 cursor-grab shrink-0"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div>' +
            '<img src="'+(p.image||'')+'" class="w-10 h-10 rounded-lg object-cover border border-gray-200 bg-gray-100 shrink-0">' +
            '<div class="flex-1 min-w-0">' +
                '<p class="text-xs font-bold text-gray-900 truncate">'+esc(p.name)+'</p>' +
                '<p class="text-[10px] text-gray-400 truncate">₩'+Number(p.price).toLocaleString()+' · '+esc(p.category)+' · '+p.options.map(function(o){return esc(o.name);}).join(', ')+'</p>' +
            '</div>' +
            '<div class="flex gap-1.5 shrink-0">' +
                '<button class="btn btn-gray px-2.5 py-1.5 text-xs" data-edit="'+idx+'"><i data-lucide="pencil" class="w-3 h-3"></i></button>' +
                '<button class="btn btn-red  px-2.5 py-1.5 text-xs" data-del="'+idx+'"><i data-lucide="trash-2" class="w-3 h-3"></i></button>' +
            '</div>' +
        '</div>';
    }).join('');
    $id('product-count').innerText = '총 '+editingProducts.length+'개 상품';
    lucide.createIcons();

    var list = $id('product-list');
    list.onclick = function(e){
        var ed=e.target.closest('[data-edit]'), dl=e.target.closest('[data-del]');
        if(ed) openEdit(parseInt(ed.dataset.edit));
        if(dl) deleteProduct(parseInt(dl.dataset.del));
    };
    list.ondragstart = function(e){ var el=e.target.closest('.p-row'); if(el){dragSrc=parseInt(el.dataset.idx);el.style.opacity='0.4';} };
    list.ondragover  = function(e){ e.preventDefault(); var el=e.target.closest('.p-row'); if(el) el.classList.add('drag-over'); };
    list.ondragleave = function(e){ var el=e.target.closest('.p-row'); if(el) el.classList.remove('drag-over'); };
    list.ondragend   = function(e){ var el=e.target.closest('.p-row'); if(el) el.style.opacity=''; };
    list.ondrop = function(e){
        e.preventDefault();
        var el=e.target.closest('.p-row'); if(!el) return;
        el.classList.remove('drag-over');
        var tgt=parseInt(el.dataset.idx);
        if(dragSrc===null||dragSrc===tgt){dragSrc=null;return;}
        var item=editingProducts.splice(dragSrc,1)[0];
        editingProducts.splice(tgt,0,item);
        dragSrc=null; renderProductList(); renderPreview();
    };
}

function renderPreview() {
    $id('preview-list').innerHTML = editingProducts.map(function(p){
        var variants = p.options.map(function(o,i){
            var vid=p.id+'_'+i, out=(previewStock[vid]==='SOLD_OUT');
            return {name:o.name,en:o.en||'',out:out};
        });
        var allOut = variants.every(function(v){return v.out;});
        var opts = variants.map(function(v){
            return '<div class="pv-opt '+(v.out?'pv-out':'pv-in')+'">'+esc(v.name)+
                (v.en?'<span class="text-[8px] opacity-60 uppercase font-normal">'+esc(v.en)+'</span>':'')+
            '</div>';
        }).join('');
        return '<div class="pv-card'+(allOut?' all-out':'')+'">' +
            (allOut?'<div class="pv-soldout"><span class="bg-red-600 text-white text-[10px] font-black px-3 py-1 rounded-full -rotate-12 shadow">SOLD OUT</span></div>':'') +
            '<div class="flex gap-2">' +
                '<img src="'+(p.image||'')+'" class="w-14 h-14 rounded-lg object-cover border border-gray-100 bg-gray-100 shrink-0'+(allOut?' grayscale opacity-50':'')+'">' +
                '<div class="flex-1 min-w-0">' +
                    '<span class="text-[8px] text-gray-400 font-bold tracking-wider">'+esc(p.category)+'</span>' +
                    '<p class="text-[10px] font-bold text-gray-900 leading-tight truncate">'+esc(p.name)+'</p>' +
                    '<p class="text-[10px] font-bold">₩'+Number(p.price).toLocaleString()+'</p>' +
                '</div>' +
            '</div>' +
            '<div class="mt-2 grid grid-cols-2 gap-1'+(allOut?' opacity-30 grayscale':'')+'">'+opts+'</div>' +
        '</div>';
    }).join('');
}

function saveProducts() {
    var btn=$id('save-products-btn');
    btn.disabled=true; btn.innerHTML='<div class="spin"></div><span>저장 중...</span>';
    var stockObj={};
    editingProducts.forEach(function(p){ p.options.forEach(function(o,i){ stockObj[p.id+'_'+i]='IN_STOCK'; }); });
    db.doc(PRODUCTS_PATH).set({list:editingProducts})
        .then(function(){ return db.doc(STOCK_PATH).set(stockObj); })
        .then(function(){ previewStock=stockObj; renderPreview(); showToast('저장 완료! 고객 화면이 업데이트되었습니다.'); })
        .catch(function(e){ alert('저장 실패: '+e.message); })
        .finally(function(){
            btn.disabled=false;
            btn.innerHTML='<i data-lucide="save" class="w-4 h-4"></i><span>상품 구성 저장 (즉시 반영)</span>';
            lucide.createIcons();
        });
}

function saveSettings() {
    var btn=$id('save-settings-btn');
    btn.disabled=true; btn.innerHTML='<div class="spin"></div><span>저장 중...</span>';
    var location=$id('set-location').value.trim();
    var storeUrl=$id('set-url').value.trim();
    var newPw=$id('set-pw').value.trim();
    if(location) savedSettings.location=location;
    if(storeUrl) savedSettings.storeUrl=storeUrl;
    if(newPw)    savedSettings.adminPassword=newPw;
    db.doc(SETTINGS_PATH).set(savedSettings)
        .then(function(){
            $id('hdr-location').innerText=$id('preview-subtitle').innerText=savedSettings.location||'';
            $id('set-pw').value=''; showToast('설정 저장 완료!');
        })
        .catch(function(e){ alert('저장 실패: '+e.message); })
        .finally(function(){
            btn.disabled=false;
            btn.innerHTML='<i data-lucide="save" class="w-4 h-4"></i><span>설정 저장 (즉시 반영)</span>';
            lucide.createIcons();
        });
}

function openAdd() {
    modalIdx=null; modalOpts=[];
    ['pm-name','pm-engname','pm-price','pm-category','pm-image'].forEach(function(id){$id(id).value='';});
    $id('modal-title').innerText='상품 추가';
    resetImgPreview(); renderOptionTags();
    $id('product-modal').classList.remove('hidden'); lucide.createIcons(); $id('pm-name').focus();
}

function openEdit(idx) {
    modalIdx=idx; var p=editingProducts[idx];
    modalOpts=p.options.map(function(o){return Object.assign({},o);});
    $id('pm-name').value=p.name; $id('pm-engname').value=p.engName;
    $id('pm-price').value=p.price; $id('pm-category').value=p.category;
    $id('pm-image').value=p.image||'';
    $id('modal-title').innerText='상품 편집';
    setImgPreview(p.image); renderOptionTags();
    $id('product-modal').classList.remove('hidden'); lucide.createIcons();
}

function closeModal() { $id('product-modal').classList.add('hidden'); }

function confirmModal() {
    var name=$id('pm-name').value.trim(), engName=$id('pm-engname').value.trim();
    var price=parseInt($id('pm-price').value)||0, category=$id('pm-category').value.trim().toUpperCase();
    var image=$id('pm-image').value.trim();
    if(!name){alert('상품명을 입력하세요.');return;}
    if(!modalOpts.length){alert('옵션을 1개 이상 추가하세요.');return;}
    var product={id:modalIdx!==null?editingProducts[modalIdx].id:'g'+Date.now(),name:name,engName:engName,price:price,category:category,image:image,options:modalOpts.slice()};
    if(modalIdx!==null) editingProducts[modalIdx]=product;
    else editingProducts.push(product);
    closeModal(); renderProductList(); renderPreview();
}

function deleteProduct(idx) {
    if(!confirm('"'+editingProducts[idx].name+'" 삭제할까요?')) return;
    editingProducts.splice(idx,1); renderProductList(); renderPreview();
}

function addOption() {
    var name=$id('opt-name').value.trim(), en=$id('opt-en').value.trim();
    if(!name){$id('opt-name').focus();return;}
    if(!modalOpts.find(function(o){return o.name===name;})) { modalOpts.push({name:name,en:en}); renderOptionTags(); }
    $id('opt-name').value=''; $id('opt-en').value=''; $id('opt-name').focus();
}

function renderOptionTags() {
    if(!modalOpts.length){ $id('option-tags').innerHTML='<span class="text-xs text-gray-400 self-center">옵션을 추가하세요</span>'; return; }
    $id('option-tags').innerHTML = modalOpts.map(function(o,i){
        return '<span class="chip">'+esc(o.name)+(o.en?'<span class="text-gray-400 font-normal text-[10px]"> '+esc(o.en)+'</span>':'')+
            '<span class="chip-x" data-rmopt="'+i+'">✕</span></span>';
    }).join('');
}

function setImgPreview(url) {
    if(url) $id('img-preview').innerHTML='<img src="'+url+'" class="w-full h-full object-cover">';
    else resetImgPreview();
}
function resetImgPreview() { $id('img-preview').innerHTML='<i data-lucide="image" class="w-4 h-4"></i>'; lucide.createIcons(); }

function showToast(msg) {
    $id('toast-msg').innerText=msg; $id('toast').classList.remove('hidden');
    setTimeout(function(){$id('toast').classList.add('hidden');},2500);
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
