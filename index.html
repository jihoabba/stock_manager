    <style>
        body { font-family: "Pretendard Variable", Pretendard, sans-serif; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-marquee { display: inline-block; padding-left: 100%; animation: marquee 18s linear infinite; }
        @keyframes marquee { 0%{transform:translate(0,0);} 100%{transform:translate(-100%,0);} }
        .opt-badge { font-size:11px; padding:4px 8px; border-radius:6px; font-weight:700; border:1px solid transparent; display:flex; align-items:center; justify-content:space-between; }
        .opt-in  { background:#DCFCE7; color:#166534; border-color:#86EFAC; }
        .opt-out { background:#FEE2E2; color:#991B1B; border-color:#FECACA; text-decoration:line-through; }
        .soldout-overlay { position:absolute; inset:0; background:rgba(255,255,255,0.6); backdrop-filter:blur(2px); z-index:10; display:flex; align-items:center; justify-content:center; border-radius:10px; }
        .spinner { border:2px solid rgba(0,0,0,0.1); border-left-color:#000; border-radius:50%; width:16px; height:16px; animation:spin 1s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
    </style>

<body class="bg-[#f8f9fa] text-[#111] h-[100dvh] flex flex-col justify-center items-center">

<div class="w-full max-w-md h-full sm:h-auto sm:max-h-[95vh] flex flex-col sm:border sm:rounded-xl sm:shadow-xl bg-white overflow-hidden">
    <div class="w-full h-full flex flex-col bg-white relative overflow-hidden">

        <!-- 헤더 -->
        <div class="p-4 flex items-center justify-between shrink-0 bg-white border-b border-gray-100">
            <div>
                <p class="font-bold text-xl leading-none tracking-tight">POP-UP LIVE STOCK</p>
                <p id="subtitle" class="text-[10px] text-gray-500 font-medium mt-1">Loading...</p>
            </div>
            <span id="last-updated" class="text-[10px] text-gray-400 font-mono">syncing...</span>
        </div>

        <!-- 배너 -->
        <div class="bg-gray-600 text-white px-4 py-2.5 text-xs font-bold overflow-hidden whitespace-nowrap flex items-center gap-2 shrink-0">
            <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse shrink-0"></span>
            <div class="animate-marquee">실시간 재고 현황입니다. 붉은색 표시는 품절입니다. 현장 상황에 따라 차이가 있을 수 있습니다.</div>
        </div>

        <div id="product-list" class="flex-1 overflow-y-auto p-4 pb-36 scrollbar-hide space-y-4"></div>

        <!-- 푸터 -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-white/95 backdrop-blur border-t border-gray-100 z-20 flex flex-col gap-2">
            <button onclick="manualRefresh()" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3.5 rounded-lg flex items-center justify-center gap-2 text-sm active:scale-[0.98] transition-all">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로고침
            </button>
            <a id="store-link" href="#" target="_blank" class="w-full bg-white border border-gray-200 text-[#111] font-bold py-3.5 rounded-lg flex items-center justify-center gap-2 text-sm active:scale-[0.98] transition-all">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i> 온라인 스토어 방문하기
            </a>
        </div>
    </div>
</div>

<script>
firebase.initializeApp({

var auth = firebase.auth();
var db   = firebase.firestore();
var APP_ID = 'mmmm-popup-busan-v1';

var DEFAULT_PRODUCTS = [
    {id:"g0",  name:"MMMM_베이비 코스튬 인형",       engName:"MMMM_BABY COSTUME PLUSH",        price:23000, category:"PLUSH",   image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Plush_05.jpg?v=1770181303",         options:MMMM_OPTS},
    {id:"g1",  name:"MMMM_베이비 댕글 모바일 참",     engName:"MMMM_BABY DGL MOBILE CHARM",     price:17000, category:"ACC",     image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Mobile_Charm_02.jpg?v=1770181224",   options:MMMM_OPTS},

    {id:"g3",  name:"MMMM_안아줘요 인형 크로스백",    engName:"MMMM_HUG ME PL CROSSBAG",        price:39000, category:"FASHION", image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Crossbody-Bag_01_b21451ad-c952-489b-9564-feef049145d7.jpg?v=1770181008", options:MMMM_OPTS},
    {id:"g4",  name:"MMMM_플러시 줄자 키링",          engName:"MMMM_PLUSH TAPELINE KEYRING",    price:16000, category:"ACC",     image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Plush_Tape_Measure_01.jpg?v=1770181046", options:MMMM_OPTS},

    {id:"g9",  name:"MMMM_포인트 레진 키캡",          engName:"MMMM_POINT RESIN KEYCAP",        price:28500, category:"TECH",    image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_586c9847-58a7-4ae9-a8d5-b089aabc90cc.jpg?v=1770178193", options:MMMM_OPTS},
    {id:"g10", name:"MMMM_양말",                      engName:"MMMM_SOCKS",                     price:8000,  category:"FASHION", image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_9173e949-c758-4ea3-8d9d-cb4062145d84.jpg?v=1770179924", options:MMMM_OPTS},
    {id:"g11", name:"MMMM_랜덤 플러시 뱃지(10types)", engName:"MMMM_RANDOM PLUSH BADGE(10TY)", price:12000, category:"ACC",     image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Plush-Badge_01.jpg?v=1770181176",      options:[{name:"단품",en:""}]},
    {id:"g12", name:"MMMM_PVC 투명 백참 파우치",      engName:"MMMM_PVC CLEAR BAGCHARM POUCH", price:18000, category:"ACC",     image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Clear-Pouch_01.jpg?v=1770179727",      options:[{name:"단품",en:""}]},
    {id:"g13", name:"MMMM_턴어라운드 머그",            engName:"MMMM_TURNAROUND MUG",            price:18000, category:"LIVING",  image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/Mug_01.jpg?v=1770178433",             options:[{name:"단품",en:""}]},
    {id:"g14", name:"MMMM_레이어드 아크릴 마그넷",    engName:"MMMM_LAYERED ACR MAGNET",        price:8000,  category:"LIVING",  image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_6296e3a7-bc3d-4ff2-9afd-ff26698c7cf2.jpg?v=1770179130", options:MMMM_OPTS},
    {id:"g15", name:"MMMM_응원봉 메탈참 스트랩",      engName:"MMMM_METAL CHARM STRAP",         price:16000, category:"ACC",     image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_0858f66b-aed6-462c-a268-fce58fa05d70.jpg?v=1770178517", options:MMMM_OPTS},
    {id:"g16", name:"MMMM_후드 집업",                 engName:"MMMM_HOODIE ZIPUP",              price:75000, category:"FASHION", image:"https://cdn.shopify.com/s/files/1/0513/1599/8919/files/01_8883ed28-f008-4245-bd8b-b3b47e8cd449.jpg?v=1770178397", options:[{name:"FREE",en:""}]}
];
var DEFAULT_SETTINGS = {
    location: "신세계 센텀시티 부산 (Shinsegae Centum City Busan)",
    storeUrl: "https://linefriendssquare.com/collections/mmmm?utm_source=OFFLINE_STOCK_BUSAN"
};

var products = [];
var unsub = null;

document.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
    auth.signInAnonymously().then(function() {
        loadConfig();
    }).catch(console.error);

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') { if(unsub){unsub();unsub=null;} }
        else listenStock();
    });
});

function loadConfig() {
    Promise.all([
        db.doc('artifacts/'+APP_ID+'/public/data/config/settings').get(),
        db.doc('artifacts/'+APP_ID+'/public/data/config/products').get()
    ]).then(function(results) {
        var sSnap = results[0], pSnap = results[1];
        var settings = sSnap.exists ? Object.assign({}, DEFAULT_SETTINGS, sSnap.data()) : DEFAULT_SETTINGS;
        document.getElementById('subtitle').innerText = settings.location;
        document.getElementById('store-link').href = settings.storeUrl;

        var raw = (pSnap.exists && pSnap.data().list && pSnap.data().list.length) ? pSnap.data().list : DEFAULT_PRODUCTS;
        products = raw.map(function(p) {
            return Object.assign({}, p, {
                variants: p.options.map(function(o,i) {
                    return { id:p.id+'_'+i, name:typeof o==='object'?o.name:o, en:typeof o==='object'?(o.en||''):'', status:'IN_STOCK' };
                })
            });
        });
        render();
        listenStock();
    }).catch(function() {
        document.getElementById('subtitle').innerText = DEFAULT_SETTINGS.location;
        document.getElementById('store-link').href = DEFAULT_SETTINGS.storeUrl;
        products = DEFAULT_PRODUCTS.map(function(p) {
            return Object.assign({}, p, { variants: p.options.map(function(o,i){ return {id:p.id+'_'+i,name:o.name||o,en:o.en||'',status:'IN_STOCK'}; }) });
        });
        render();
    });
}

function listenStock() {
    if (unsub) return;
    unsub = db.doc('artifacts/'+APP_ID+'/public/data/inventory/all_stock').onSnapshot(function(snap) {
        if (snap.exists) {
            var d = snap.data();
            products.forEach(function(g) { g.variants.forEach(function(v) { if(d[v.id]) v.status=d[v.id]; }); });
        }
        render();
        var t = new Date();
        document.getElementById('last-updated').innerText = 'Live: '+t.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    });
}

function render() {
    document.getElementById('product-list').innerHTML = products.map(function(g) {
        var allOut = g.variants.every(function(v){return v.status==='SOLD_OUT';});
        var opts = g.variants.map(function(v) {
            var out = v.status==='SOLD_OUT';
            return '<div class="opt-badge '+(out?'opt-out':'opt-in')+'">' +
                '<div class="flex items-baseline gap-1"><span>'+v.name+'</span>'+(v.en?'<span class="text-[9px] opacity-60 uppercase font-normal">'+v.en+'</span>':'')+'</div>' +
                '<span class="text-[9px] opacity-80 ml-1 whitespace-nowrap">'+(out?'SOLD OUT':'재고 있음')+'</span>' +
            '</div>';
        }).join('');
        return '<div class="relative bg-white border-2 '+(allOut?'border-gray-200':'border-black/5')+' rounded-xl p-3 shadow-sm overflow-hidden">' +
            (allOut?'<div class="soldout-overlay"><div class="bg-red-600 text-white text-sm font-black px-4 py-2 rounded-full border-2 border-white -rotate-12 shadow-lg">SOLD OUT</div></div>':'') +
            '<div class="flex gap-4">' +
                '<div class="w-24 h-24 shrink-0 rounded-lg bg-gray-50 overflow-hidden border border-black/5">' +
                    '<img src="'+g.image+'" class="w-full h-full object-cover'+(allOut?' grayscale opacity-50':'')+'" loading="lazy">' +
                '</div>' +
                '<div class="flex-1 min-w-0 flex flex-col">' +
                    '<span class="text-[10px] text-gray-400 font-bold tracking-wider">'+g.category+'</span>' +
                    '<h3 class="text-sm font-bold text-gray-900 leading-tight mb-0.5">'+g.name+'</h3>' +
                    '<p class="text-[10px] text-gray-400 leading-tight mb-1 truncate">'+g.engName+'</p>' +
                    '<div class="text-sm font-bold mt-auto">₩'+Number(g.price).toLocaleString()+'</div>' +
                '</div>' +
            '</div>' +
            '<div class="mt-3 grid grid-cols-2 gap-1.5'+(allOut?' opacity-30 grayscale':'')+'">'+opts+'</div>' +
        '</div>';
    }).join('');
    lucide.createIcons();
}

function manualRefresh() {
    render();
    if(typeof gtag==='function') gtag('event','click_refresh',{event_category:'engagement'});
}
</script>
</body>
</html>
