<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-POP SQUARE — POP-UP ASSISTANT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f5f3;
  --gray:  #888;
  --line:  rgba(255,255,255,0.1);
  --accent:#e8e0d0;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: var(--black);
  color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── 헤더 ── */
header {
  padding: 28px 24px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  line-height: 1;
}
.logo-main {
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--gray);
}
.logo-sub {
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--white);
}
.header-tag {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gray);
  border: 1px solid #333;
  padding: 5px 8px;
  margin-top: 4px;
  font-family: 'Bebas Neue', sans-serif;
}

/* ── NOW IN SQUARE ── */
.now-section {
  margin: 32px 24px 0;
}
.now-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--gray);
  margin-bottom: 12px;
  font-family: 'Bebas Neue', sans-serif;
}
.now-card {
  display: block;
  width: 100%;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  text-decoration: none;
  background: #111;
}
.now-card img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease, opacity 0.3s;
  opacity: 0.9;
}
.now-card:active img { transform: scale(0.99); opacity: 0.7; }
.now-card-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px 16px 14px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
}
.now-card-cta {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--accent);
  font-family: 'Bebas Neue', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}
.now-card-cta::after {
  content: '→';
  font-size: 11px;
}

/* ── 구분선 ── */
.divider {
  height: 1px;
  background: var(--line);
  margin: 32px 24px 0;
}

/* ── 메뉴 그리드 ── */
.menu-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--gray);
  margin: 28px 24px 16px;
  font-family: 'Bebas Neue', sans-serif;
}

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  margin: 0 24px;
  border: 1px solid var(--line);
}

.menu-item {
  background: var(--black);
  padding: 22px 18px 20px;
  text-decoration: none;
  color: var(--white);
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  overflow: hidden;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.menu-item:active { background: #141414; }

.menu-item::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--white);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}
.menu-item:active::after { transform: scaleX(1); }

.menu-icon {
  font-size: 22px;
  line-height: 1;
}
.menu-title-ko {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.3px;
  line-height: 1.3;
}
.menu-title-en {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--gray);
  font-family: 'Bebas Neue', sans-serif;
  margin-top: 2px;
}
.menu-arrow {
  position: absolute;
  top: 18px; right: 16px;
  font-size: 11px;
  color: #444;
}

/* ── 푸터 ── */
footer {
  margin: 40px 24px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: #333;
}
.footer-loc {
  font-size: 9px;
  color: #333;
  letter-spacing: 1px;
}

/* ── 애니메이션 ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
header       { animation: fadeUp 0.5s ease both; }
.now-section { animation: fadeUp 0.5s 0.1s ease both; }
.divider     { animation: fadeUp 0.4s 0.2s ease both; }
.menu-label  { animation: fadeUp 0.4s 0.25s ease both; }
.menu-grid   { animation: fadeUp 0.5s 0.3s ease both; }
footer       { animation: fadeUp 0.4s 0.4s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">K-POP SQUARE</div>
    <div class="logo-sub">POP-UP ASSISTANT</div>
  </div>
  <div class="header-tag">HONGDAE</div>
</header>

<!-- NOW IN SQUARE -->
<section class="now-section">
  <div class="now-label">NOW IN SQUARE</div>
  <a class="now-card"
     href="https://linefriendssquare.com/blogs/event/n-sweet-2603"
     target="_blank">
    <img src="https://cdn.shopify.com/s/files/1/0513/1599/8919/articles/1d021ac2032157968b211530670ea0c4_97372fae-4292-4b51-b083-a2e2664f350b.jpg?v=1772071666"
         alt="현재 팝업 이벤트" loading="eager">
    <div class="now-card-overlay">
      <div class="now-card-cta">자세히 보기</div>
    </div>
  </a>
</section>

<div class="divider"></div>

<!-- 메뉴 -->
<div class="menu-label">WHAT CAN I HELP YOU WITH</div>

<div class="menu-grid">

  <a class="menu-item" href="./inventory.html">
    <div class="menu-icon">📦</div>
    <div>
      <div class="menu-title-ko">재고 확인</div>
      <div class="menu-title-en">STOCK CHECK</div>
    </div>
    <div class="menu-arrow">↗</div>
  </a>

  <a class="menu-item" href="./mmmm-run.html">
    <div class="menu-icon">🎮</div>
    <div>
      <div class="menu-title-ko">대기시간 게임</div>
      <div class="menu-title-en">SQUARE RUN</div>
    </div>
    <div class="menu-arrow">↗</div>
  </a>

  <a class="menu-item" href="./restaurants.html">
    <div class="menu-icon">🍜</div>
    <div>
      <div class="menu-title-ko">근처 맛집</div>
      <div class="menu-title-en">NEARBY EATS</div>
    </div>
    <div class="menu-arrow">↗</div>
  </a>

  <a class="menu-item" href="./trade.html">
    <div class="menu-icon">🔄</div>
    <div>
      <div class="menu-title-ko">교환 · 나눔</div>
      <div class="menu-title-en">GOODS TRADE</div>
    </div>
    <div class="menu-arrow">↗</div>
  </a>

</div>

<footer>
  <div class="footer-brand">K-POP SQUARE</div>
  <div class="footer-loc">서울 마포구 홍대</div>
</footer>

</body>
</html>
